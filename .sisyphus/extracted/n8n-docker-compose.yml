services:
  n8n:
    image: n8nio/n8n:1.97.1
    restart: unless-stopped
    network_mode: host
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.aleqsys.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.aleqsys.com
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=rovak
      - N8N_BASIC_AUTH_PASSWORD=Mosca2020
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - GENERIC_TIMEZONE=America/Santiago
    volumes:
      - n8n_data:/home/node/.n8n


volumes:
  n8n_data:

